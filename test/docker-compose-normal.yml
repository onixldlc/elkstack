services:
  elasticsearch:
    container_name: elasticsearch-test-normal
    build: ../elastic
    volumes:
      - ./data/normal/elastic/data:/var/lib/elasticsearch:z
      - ./data/normal/elastic/logs:/var/log/elasticsearch:z
      - ./data/normal/elastic/config:/tmp/config:z
      - share-normal:/tmp/share
      - pub-share-normal:/tmp/pub-share
    environment:
      - ELASTIC_PASSWORD=TestPassword123

  kibana:
    container_name: kibana-test-normal
    build: ../kibana
    ports:
      - "127.0.0.1:5601:5601"
    volumes:
      - ./data/normal/kibana/logs:/var/log/kibana:z
      - ./data/normal/kibana/config:/tmp/config:z
      - share-normal:/tmp/share
    environment:
      - KIBANA_HOST=0.0.0.0
      - KIBANA_PORT=5601
      - KIBANA_BASEURL=https://kibana:5601
      - 'ELASTICSEARCH_URLS=["https://elasticsearch:9200"]'
    depends_on:
      - elasticsearch

  logstash:
    container_name: logstash-test-normal
    build: ../logstash
    volumes:
      - ./data/normal/logstash/config:/tmp/config:z
      - pub-share-normal:/tmp/pub-share
    environment:
      - KIBANA_BASEURL=https://kibana:5601
      - 'ELASTICSEARCH_URLS=["https://elasticsearch:9200"]'
    depends_on:
      - elasticsearch
      - kibana

volumes:
  share-normal:
  pub-share-normal:
